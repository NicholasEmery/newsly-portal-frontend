version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    pull-request-branch-name:
      separator: "/"
    commit-message:
      prefix: "deps"
      include: scope
    assignees:
      - "NicholasEmery"
    labels:
      - "dependencies"
      - "automated"
    groups:
      app-framework:
        patterns:
          - "next*"
          - "react*"
          - "react-dom"
          - "next-intl"
          - "next-themes"
      ui-and-animation:
        patterns:
          - "@base-ui/*"
          - "lucide-react"
          - "react-icons"
          - "gsap"
          - "tw-animate-css"
          - "country-flag-icons"
          - "@lottiefiles/*"
      data-fetching-and-state:
        patterns:
          - "axios"
          - "zustand"
          - "js-cookie"
          - "libsodium-wrappers"
          - "dompurify"
      forms-and-validation:
        patterns:
          - "react-hook-form"
          - "@hookform/*"
          - "zod"
      styling-and-build:
        patterns:
          - "tailwind*"
          - "@tailwindcss/*"
          - "postcss"
          - "clsx"
          - "class-variance-authority"
          - "tailwind-merge"
      testing-and-linting:
        patterns:
          - "eslint*"
          - "prettier"
          - "vitest"
          - "cypress"
          - "jsdom"
          - "@testing-library/*"
      types-and-tooling:
        patterns:
          - "typescript"
          - "@types/*"
          - "tsx"
          - "babel-plugin-react-compiler"
          - "baseline-browser-mapping"
      utilities:
        patterns:
          - "dotenv"
    rebase-strategy: "auto"


