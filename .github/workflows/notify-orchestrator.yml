name: Notify orchestrator on frontend main change

on:
    workflow_run:
        workflows: ["CI"]
        types: ["completed"]

permissions:
    contents: read

jobs:
    notify:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        steps:
            - name: Call orchestrator repository_dispatch
              env:
                ORCHESTRATOR_REPO: "NicholasEmery/newsly-portal-orchestrator"
                GH_TOKEN: ${{ secrets.ORCHESTRATOR_PAT }}
              run: |
                payload=$(jq -n \
                    --arg event_type "frontend-updated" \
                    --arg source_repo "$GITHUB_REPOSITORY" \
                    '{event_type: $event_type, client_payload: {source_repo: $source_repo}}')

                curl -X POST \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: Bearer $GH_TOKEN" \
                    https://api.github.com/repos/$ORCHESTRATOR_REPO/dispatches \
                    -d "$payload"
